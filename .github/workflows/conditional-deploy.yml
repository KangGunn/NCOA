name: Conditional Deploy to Firebase

on:
  push:
    branches:
      - 'FE/**'
      - 'BE/**'
      - 'FS/**'
      - 'fe/**'
      - 'be/**'
      - 'fs/**'

jobs:
  deploy_fe:
    name: Deploy Front-End (Hosting)
    if: |
      startsWith(github.ref_name, 'FE/') || 
      startsWith(github.ref_name, 'FS/') || 
      startsWith(github.ref_name, 'fe/') || 
      startsWith(github.ref_name, 'fs/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies & Build FE
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENIORKATUSA_AA594 }}
          channelId: live
          projectId: seniorkatusa-aa594

  deploy_be:
    name: Deploy Back-End (Functions)
    if: |
      startsWith(github.ref_name, 'BE/') || 
      startsWith(github.ref_name, 'FS/') || 
      startsWith(github.ref_name, 'be/') || 
      startsWith(github.ref_name, 'fs/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install & Build Functions
        run: |
          cd functions
          npm ci
          npm run build

      - name: Deploy to Firebase Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENIORKATUSA_AA594 }}
