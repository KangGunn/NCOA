name: Deploy to Firebase on Merge
on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ----------------------------------------------------
      # Front-End (FE) Deploy
      # ----------------------------------------------------
      - name: Install Frontend Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENIORKATUSA_AA594 }}
          channelId: live
          projectId: seniorkatusa-aa594
          firebaseToolsVersion: 13.15.4

      # ----------------------------------------------------
      # Back-End (BE) Deploy
      # ----------------------------------------------------
      - name: Install Backend Dependencies
        run: |
          cd functions
          npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENIORKATUSA_AA594 }}

      - name: Deploy to Firebase Functions
        run: npx firebase-tools deploy --only functions --project seniorkatusa-aa594
